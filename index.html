<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhara Enterprise | GST Billing & Inventory</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background-color: #f4f7f6; color: #333; }
        header { text-align: center; padding: 25px; background: #2c3e50; color: white; border-radius: 8px; margin-bottom: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .dashboard-grid { display: flex; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; }
        .stat-card { flex: 1; background: #f8f9fa; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #dee2e6; min-width: 200px; }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: #27ae60; }

        .form-section { background: #fdfdfd; padding: 20px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 10px; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 6px; flex: 1; min-width: 140px; font-size: 1rem; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-add { background: #27ae60; color: white; width: 100%; margin-top: 10px; }
        .btn-bill { background: #8e44ad; color: white; padding: 5px 10px; }
        .btn-delete { background: #e74c3c; color: white; padding: 5px 10px; }
        
        #searchInput { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #3498db; border-radius: 6px; box-sizing: border-box; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #7f8c8d; text-transform: uppercase; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <h1>Dhara Enterprise</h1>
    <p>Inventory, Stock & GST Compliance Portal</p>
</header>

<div class="container">
    <div class="dashboard-grid">
        <div class="stat-card">
            <div>Stock Value</div>
            <div class="stat-value" id="totalValue">₹0</div>
        </div>
        <div class="stat-card">
            <div>Total Quantity</div>
            <div class="stat-value" id="itemCount">0</div>
        </div>
    </div>

    <div class="form-section">
        <h3>Manage Inventory Item</h3>
        <div class="input-group">
            <input type="hidden" id="editIndex">
            <input type="text" id="itemName" placeholder="Item Name">
            <input type="number" id="itemQty" placeholder="Quantity">
            <input type="number" id="itemPrice" placeholder="Unit Price (₹)">
            <select id="itemCategory">
                <option value="General">General</option>
                <option value="Electronics">Electronics</option>
                <option value="Stationery">Stationery</option>
            </select>
        </div>
        <button class="btn btn-add" onclick="saveItem()">Save to Inventory</button>
    </div>

    <input type="text" id="searchInput" onkeyup="filterItems()" placeholder="Search items...">

    <table id="itemTable">
        <thead>
            <tr>
                <th>Item Details</th>
                <th>Stock</th>
                <th>Unit Rate</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    window.onload = displayItems;

    function saveItem() {
        const name = document.getElementById('itemName').value;
        const qty = parseInt(document.getElementById('itemQty').value);
        const price = parseFloat(document.getElementById('itemPrice').value);
        const category = document.getElementById('itemCategory').value;

        if (!name || isNaN(qty) || isNaN(price)) {
            alert("Please fill all item details."); return;
        }

        let items = JSON.parse(localStorage.getItem('dhara_items')) || [];
        items.push({ name, qty, price, category });
        localStorage.setItem('dhara_items', JSON.stringify(items));
        
        document.getElementById('itemName').value = '';
        document.getElementById('itemQty').value = '';
        document.getElementById('itemPrice').value = '';
        displayItems();
    }

    function displayItems() {
        const items = JSON.parse(localStorage.getItem('dhara_items')) || [];
        const tableBody = document.getElementById('tableBody');
        let grandTotal = 0; let totalQty = 0;
        tableBody.innerHTML = '';

        items.forEach((item, index) => {
            grandTotal += (item.qty * item.price);
            totalQty += item.qty;
            tableBody.innerHTML += `
                <tr>
                    <td><strong>${item.name}</strong><br><small>${item.category}</small></td>
                    <td>${item.qty}</td>
                    <td>₹${item.price.toLocaleString()}</td>
                    <td>
                        <button class="btn btn-bill" onclick="promptBillDetails(${index})">Generate Bill</button>
                        <button class="btn btn-delete" onclick="deleteItem(${index})">Delete</button>
                    </td>
                </tr>`;
        });
        document.getElementById('totalValue').innerText = "₹" + grandTotal.toLocaleString();
        document.getElementById('itemCount').innerText = totalQty;
    }

    function promptBillDetails(index) {
        const customer = prompt("Enter Customer Name:", "Valued Customer");
        const date = prompt("Enter Date:", new Date().toLocaleDateString());
        const gstType = prompt("Type 'GST' for CGST+SGST or 'IGST' for Inter-state:", "GST");
        const gstRate = prompt("Enter GST % (e.g. 5, 12, 18):", "18");

        if (customer && gstRate) {
            generateBill(index, customer, date, gstType, parseFloat(gstRate));
        }
    }

    function generateBill(index, customer, date, gstType, rate) {
        const item = JSON.parse(localStorage.getItem('dhara_items'))[index];
        const subtotal = item.qty * item.price;
        const totalTax = subtotal * (rate / 100);
        const grandTotal = subtotal + totalTax;

        let taxBreakdown = "";
        if (gstType.toUpperCase() === "IGST") {
            taxBreakdown = `<p>IGST (${rate}%): ₹${totalTax.toFixed(2)}</p>`;
        } else {
            const halfRate = rate / 2;
            const halfTax = totalTax / 2;
            taxBreakdown = `<p>CGST (${halfRate}%): ₹${halfTax.toFixed(2)}</p><p>SGST (${halfRate}%): ₹${halfTax.toFixed(2)}</p>`;
        }

        const billWin = window.open('', '_blank');
        billWin.document.write(`
            <html><head><style>
                body { font-family: sans-serif; padding: 30px; border: 1px solid #eee; max-width: 800px; margin: auto; }
                .header { text-align: center; border-bottom: 2px solid #2c3e50; padding-bottom: 10px; }
                table { width: 100%; border-collapse: collapse; margin: 20px 0; }
                th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
                .right { text-align: right; }
                .footer { margin-top: 30px; font-size: 12px; text-align: center; color: #666; }
                @media print { .no-print { display: none; } }
            </style></head>
            <body>
                <div class="header"><h1>DHARA ENTERPRISE</h1><p>TAX INVOICE</p></div>
                <p><strong>Customer:</strong> ${customer} | <strong>Date:</strong> ${date}</p>
                <table>
                    <thead><tr><th>Item</th><th>Qty</th><th>Rate</th><th>Total</th></tr></thead>
                    <tbody><tr><td>${item.name}</td><td>${item.qty}</td><td>₹${item.price}</td><td>₹${subtotal}</td></tr></tbody>
                </table>
                <div class="right">
                    <p>Subtotal: ₹${subtotal.toLocaleString()}</p>
                    ${taxBreakdown}
                    <hr><h3>Grand Total: ₹${grandTotal.toLocaleString()}</h3>
                </div>
                <div class="footer"><p>Authorized Signatory</p><br><br><button class="no-print" onclick="window.print()">Print/Save PDF</button></div>
            </body></html>
        `);
    }

    function deleteItem(index) {
        let items = JSON.parse(localStorage.getItem('dhara_items'));
        items.splice(index, 1);
        localStorage.setItem('dhara_items', JSON.stringify(items));
        displayItems();
    }

    function filterItems() {
        const input = document.getElementById('searchInput').value.toLowerCase();
        const rows = document.getElementById('tableBody').getElementsByTagName('tr');
        for (let row of rows) {
            row.style.display = row.innerText.toLowerCase().includes(input) ? "" : "none";
        }
    }
</script>
</body>
</html>
