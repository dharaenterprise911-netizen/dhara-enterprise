<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhara Enterprise | categorized Inventory</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background-color: #f4f7f6; color: #333; }
        header { text-align: center; padding: 25px; background: #2c3e50; color: white; border-radius: 8px; margin-bottom: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .dashboard-grid { display: flex; gap: 20px; margin-bottom: 25px; }
        .stat-card { flex: 1; background: #f8f9fa; padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #dee2e6; }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: #27ae60; }

        .form-section { background: #fdfdfd; padding: 20px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 20px; }
        .input-group { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        input, select { padding: 12px; border: 1px solid #ccc; border-radius: 6px; flex: 1; min-width: 150px; font-size: 1rem; }
        
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .btn-add { background: #27ae60; color: white; }
        .btn-update { background: #f39c12; color: white; }
        .btn-cancel { background: #95a5a6; color: white; }
        .btn-edit { background: #3498db; color: white; padding: 5px 10px; margin-right: 5px; }
        .btn-delete { background: #e74c3c; color: white; padding: 5px 10px; }
        .btn-download { background: #34495e; color: white; margin-top: 15px; }

        #searchInput { width: 100%; padding: 12px; margin: 20px 0; border: 2px solid #3498db; border-radius: 6px; box-sizing: border-box; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #f8f9fa; color: #7f8c8d; text-transform: uppercase; font-size: 0.8rem; }
        .badge { background: #ebf5fb; color: #2980b9; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>Dhara Enterprise</h1>
    <p>Organized Business Inventory</p>
</header>

<div class="container">
    <div class="dashboard-grid">
        <div class="stat-card">
            <div>Total Value</div>
            <div class="stat-value" id="totalValue">₹0</div>
        </div>
        <div class="stat-card">
            <div>Total Items</div>
            <div class="stat-value" id="itemCount">0</div>
        </div>
    </div>

    <div class="form-section">
        <h3 id="formTitle">Add New Item</h3>
        <div class="input-group">
            <input type="hidden" id="editIndex">
            <input type="text" id="itemName" placeholder="Item Name">
            <select id="itemCategory">
                <option value="General">General</option>
                <option value="Electronics">Electronics</option>
                <option value="Furniture">Furniture</option>
                <option value="Stationery">Stationery</option>
                <option value="Clothing">Clothing</option>
            </select>
            <input type="number" id="itemPrice" placeholder="Price (₹)">
            <button id="addBtn" class="btn btn-add" onclick="saveItem()">+ Add Item</button>
            <button id="cancelBtn" class="btn btn-cancel" style="display:none;" onclick="resetForm()">Cancel</button>
        </div>
        <button class="btn btn-download" onclick="downloadData()">Download Inventory Backup</button>
    </div>

    <input type="text" id="searchInput" onkeyup="filterItems()" placeholder="Search by name or category...">

    <table id="itemTable">
        <thead>
            <tr>
                <th>Item Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    let editMode = false;

    window.onload = displayItems;

    function saveItem() {
        const name = document.getElementById('itemName').value;
        const category = document.getElementById('itemCategory').value;
        const price = parseFloat(document.getElementById('itemPrice').value);
        const index = document.getElementById('editIndex').value;

        if (!name || isNaN(price)) {
            alert("Please provide valid details.");
            return;
        }

        let items = JSON.parse(localStorage.getItem('dhara_items')) || [];

        if (editMode) {
            items[index] = { name, category, price };
            editMode = false;
        } else {
            items.push({ name, category, price });
        }

        localStorage.setItem('dhara_items', JSON.stringify(items));
        resetForm();
        displayItems();
    }

    function displayItems() {
        const items = JSON.parse(localStorage.getItem('dhara_items')) || [];
        const tableBody = document.getElementById('tableBody');
        const totalDisplay = document.getElementById('totalValue');
        const countDisplay = document.getElementById('itemCount');
        
        tableBody.innerHTML = '';
        let total = 0;

        items.forEach((item, index) => {
            total += item.price;
            tableBody.innerHTML += `
                <tr>
                    <td><strong>${item.name}</strong></td>
                    <td><span class="badge">${item.category}</span></td>
                    <td>₹${item.price.toLocaleString()}</td>
                    <td>
                        <button class="btn btn-edit" onclick="startEdit(${index})">Edit</button>
                        <button class="btn btn-delete" onclick="deleteItem(${index})">Delete</button>
                    </td>
                </tr>`;
        });

        totalDisplay.innerText = "₹" + total.toLocaleString();
        countDisplay.innerText = items.length;
    }

    function startEdit(index) {
        const items = JSON.parse(localStorage.getItem('dhara_items'));
        const item = items[index];

        document.getElementById('itemName').value = item.name;
        document.getElementById('itemCategory').value = item.category || 'General';
        document.getElementById('itemPrice').value = item.price;
        document.getElementById('editIndex').value = index;
        
        editMode = true;
        document.getElementById('formTitle').innerText = "Edit Item";
        document.getElementById('addBtn').innerText = "Update";
        document.getElementById('addBtn').className = "btn btn-update";
        document.getElementById('cancelBtn').style.display = "inline-block";
    }

    function resetForm() {
        document.getElementById('itemName').value = '';
        document.getElementById('itemCategory').value = 'General';
        document.getElementById('itemPrice').value = '';
        document.getElementById('editIndex').value = '';
        editMode = false;
        document.getElementById('formTitle').innerText = "Add New Item";
        document.getElementById('addBtn').innerText = "+ Add Item";
        document.getElementById('addBtn').className = "btn btn-add";
        document.getElementById('cancelBtn').style.display = "none";
    }

    function filterItems() {
        const input = document.getElementById('searchInput').value.toLowerCase();
        const rows = document.getElementById('tableBody').getElementsByTagName('tr');

        for (let row of rows) {
            const name = row.getElementsByTagName('td')[0].innerText.toLowerCase();
            const cat = row.getElementsByTagName('td')[1].innerText.toLowerCase();
            row.style.display = (name.includes(input) || cat.includes(input)) ? "" : "none";
        }
    }

    function deleteItem(index) {
        if(confirm("Delete this item?")) {
            let items = JSON.parse(localStorage.getItem('dhara_items'));
            items.splice(index, 1);
            localStorage.setItem('dhara_items', JSON.stringify(items));
            displayItems();
        }
    }

    function downloadData() {
        const items = localStorage.getItem('dhara_items') || "[]";
        const blob = new Blob([items], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'dhara_enterprise_inventory.json';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }
</script>

</body>
</html>
