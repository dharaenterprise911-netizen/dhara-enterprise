<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhara Enterprise | Stock Master</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #0f172a; --accent: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: #1e293b; display: flex; }
        .sidebar { width: 240px; background: var(--primary); color: white; height: 100vh; position: fixed; padding: 30px 20px; box-sizing: border-box; }
        .sidebar h1 { font-size: 1.2rem; color: #38bdf8; margin-bottom: 40px; border-bottom: 1px solid #334155; padding-bottom: 20px; }
        .nav-link { display: block; color: #94a3b8; text-decoration: none; padding: 12px; border-radius: 8px; margin-bottom: 10px; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { background: var(--accent); color: white; }
        .main-content { margin-left: 240px; padding: 40px; width: 100%; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .entry-box { background: white; padding: 25px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 30px; }
        .input-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; }
        .btn-save { background: var(--accent); color: white; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #f1f5f9; }
        th { background: #f1f5f9; font-size: 0.8rem; color: #475569; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>DHARA <br>ENTERPRISE</h1>
    <a href="index.html" class="nav-link active"><i class="fas fa-warehouse"></i> Stock Master</a>
    <a href="billing.html" class="nav-link"><i class="fas fa-file-invoice-dollar"></i> Easy Billing</a>
    <hr style="border: 0.5px solid #334155; margin: 20px 0;">
    <button onclick="exportData()" style="background:none; border:1px solid #334155; color:white; padding:10px; width:100%; border-radius:5px; cursor:pointer;">Backup Data</button>
</div>

<div class="main-content">
    <div class="stats-grid">
        <div class="stat-card"><small>Inventory Value</small><div id="totalVal" style="font-size:1.5rem; font-weight:700;">₹0</div></div>
        <div class="stat-card"><small>Total Units</small><div id="totalUnits" style="font-size:1.5rem; font-weight:700;">0</div></div>
    </div>

    <div class="entry-box">
        <h3>Add New Stock</h3>
        <div class="input-row">
            <input type="text" id="pName" placeholder="Item Name">
            <input type="number" id="pStock" placeholder="Qty">
            <input type="number" id="pRate" placeholder="Rate (₹)">
        </div>
        <button class="btn-save" onclick="saveProduct()">Save Item</button>
    </div>

    <table>
        <thead><tr><th>Item</th><th>Stock</th><th>Rate</th><th>Total</th><th>Action</th></tr></thead>
        <tbody id="inventoryBody"></tbody>
    </table>
</div>

<script>
    window.onload = loadInventory;
    function saveProduct() {
        const name = document.getElementById('pName').value;
        const stock = parseFloat(document.getElementById('pStock').value);
        const rate = parseFloat(document.getElementById('pRate').value);
        if(!name || isNaN(stock)) return;
        const items = JSON.parse(localStorage.getItem('dhara_inventory')) || [];
        items.push({ name, stock, rate });
        localStorage.setItem('dhara_inventory', JSON.stringify(items));
        loadInventory();
    }
    function loadInventory() {
        const items = JSON.parse(localStorage.getItem('dhara_inventory')) || [];
        const tableBody = document.getElementById('inventoryBody');
        let totalVal = 0; let totalUnits = 0;
        tableBody.innerHTML = '';
        items.forEach((item, index) => {
            const lineVal = item.stock * item.rate;
            totalVal += lineVal; totalUnits += item.stock;
            tableBody.innerHTML += `<tr><td>${item.name}</td><td>${item.stock}</td><td>₹${item.rate}</td><td>₹${lineVal}</td><td><button onclick="deleteItem(${index})">Delete</button></td></tr>`;
        });
        document.getElementById('totalVal').innerText = "₹" + totalVal.toLocaleString();
        document.getElementById('totalUnits').innerText = totalUnits;
    }
    function deleteItem(index) {
        let items = JSON.parse(localStorage.getItem('dhara_inventory'));
        items.splice(index, 1);
        localStorage.setItem('dhara_inventory', JSON.stringify(items));
        loadInventory();
    }
    function exportData() {
        const data = localStorage.getItem('dhara_inventory') || "[]";
        const blob = new Blob([data], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'dhara_backup.json'; a.click();
    }
</script>
</body>
</html>
