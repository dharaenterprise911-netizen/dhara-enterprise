    <style>
        :root {
            --primary: #2563eb;
            --secondary: #64748b;

            --danger: #ef4444;
            --dark: #0f172a;
            --bg: #f8fafc;
        }

        body { font-family: 'Inter', system-ui, sans-serif; margin: 0; background-color: var(--bg); color: var(--dark); display: flex; min-height: 100vh; }
        
        /* Sidebar Navigation */
        nav { width: 260px; background: var(--dark); color: white; padding: 20px; display: flex; flex-direction: column; }
        nav h1 { font-size: 1.2rem; margin-bottom: 40px; color: #38bdf8; letter-spacing: 1px; }
        nav a { color: #cbd5e1; text-decoration: none; padding: 12px; border-radius: 8px; margin-bottom: 5px; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        nav a:hover { background: rgba(255,255,255,0.1); color: white; }
        nav a.active { background: var(--primary); color: white; }

        /* Main Content */
        main { flex: 1; padding: 40px; overflow-y: auto; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .grid { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 16px; flex: 1; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        .card h4 { margin: 0; color: var(--secondary); font-size: 0.9rem; text-transform: uppercase; }
        .card .value { font-size: 2rem; font-weight: 700; margin-top: 10px; }

        .input-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }

        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
