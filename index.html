<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dhara Enterprise | Billing System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #0f172a;
            --accent: #2563eb;
            --bg: #f8fafc;
            --border: #e2e8f0;
        }

        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: #1e293b; }
        
        .sidebar { width: 240px; background: var(--primary); color: white; height: 100vh; position: fixed; padding: 30px 20px; }
        .sidebar h1 { font-size: 1.2rem; color: #38bdf8; margin-bottom: 40px; border-bottom: 1px solid #334155; padding-bottom: 20px; }
        
        .main-content { margin-left: 280px; padding: 40px; max-width: 1000px; }
        
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); margin-bottom: 20px; }
        
        .section-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; color: var(--primary); }

        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        label { display: block; font-size: 0.85rem; font-weight: 600; color: #64748b; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; box-sizing: border-box; font-size: 0.9rem; }

        .item-row { display: grid; grid-template-columns: 3fr 1fr 1fr 1fr 50px; gap: 10px; align-items: end; background: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 10px; }

        .btn { padding: 12px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-add { background: #f1f5f9; color: var(--accent); border: 1px dashed var(--accent); width: 100%; justify-content: center; }
        .btn-generate { background: var(--accent); color: white; width: 100%; justify-content: center; margin-top: 20px; font-size: 1rem; }
        .btn-remove { color: #ef4444; background: none; font-size: 1.2rem; }

        .bill-preview { margin-top: 30px; border-top: 2px solid var(--border); padding-top: 20px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>DHARA <br>ENTERPRISE</h1>
    <p style="font-size: 0.8rem; color: #94a3b8;"><i class="fas fa-file-invoice-dollar"></i> Billing Module v3.0</p>
</div>

<div class="main-content">
    <div class="header">
        <h2 style="margin-top:0">Create New Tax Invoice</h2>
    </div>

    <div class="card">
        <div class="section-title"><i class="fas fa-user"></i> Customer Details</div>
        <div class="input-grid">
            <div>
                <label>Customer Name</label>
                <input type="text" id="custName" placeholder="Client Name">
            </div>
            <div>
                <label>Invoice Date</label>
                <input type="date" id="invDate">
            </div>
            <div>
                <label>Invoice Number</label>
                <input type="text" id="invNum" placeholder="DE-101">
            </div>
        </div>
    </div>

    <div class="card">
        <div class="section-title"><i class="fas fa-list"></i> Items & Services</div>
        <div id="itemsContainer">
            </div>
        <button class="btn btn-add" onclick="addNewRow()">
            <i class="fas fa-plus"></i> Add Item to Bill
        </button>
    </div>

    <div class="card">
        <div class="section-title"><i class="fas fa-percent"></i> Tax Configuration</div>
        <div class="input-grid">
            <div>
                <label>GST Type</label>
                <select id="gstType">
                    <option value="GST">Intra-State (CGST + SGST)</option>
                    <option value="IGST">Inter-State (IGST)</option>
                </select>
            </div>
            <div>
                <label>GST Rate (%)</label>
                <input type="number" id="gstRate" value="18">
            </div>
        </div>
        <button class="btn btn-generate" onclick="generateFinalInvoice()">
            <i class="fas fa-print"></i> Generate & Print Invoice
        </button>
    </div>
</div>

<script>
    // Set default date to today
    document.getElementById('invDate').valueAsDate = new Date();

    function addNewRow() {
        const container = document.getElementById('itemsContainer');
        const row = document.createElement('div');
        row.className = 'item-row';
        row.innerHTML = `
            <div>
                <label>Description</label>
                <input type="text" class="item-name" placeholder="Product name">
            </div>
            <div>
                <label>Qty</label>
                <input type="number" class="item-qty" value="1">
            </div>
            <div>
                <label>Rate</label>
                <input type="number" class="item-rate" placeholder="0.00">
            </div>
            <div>
                <label>Total</label>
                <input type="text" class="item-total" value="0" disabled>
            </div>
            <button class="btn-remove" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>
        `;
        container.appendChild(row);
    }

    // Auto-add the first row on load
    window.onload = addNewRow;

    function generateFinalInvoice() {
        const customer = document.getElementById('custName').value;
        const date = document.getElementById('invDate').value;
        const invNo = document.getElementById('invNum').value;
        const gstType = document.getElementById('gstType').value;
        const rate = parseFloat(document.getElementById('gstRate').value);

        const rows = document.querySelectorAll('.item-row');
        let subtotal = 0;
        let itemsHtml = "";

        rows.forEach(row => {
            const name = row.querySelector('.item-name').value;
            const qty = parseFloat(row.querySelector('.item-qty').value);
            const rateVal = parseFloat(row.querySelector('.item-rate').value);
            const lineTotal = qty * rateVal;
            
            if (name && !isNaN(lineTotal)) {
                subtotal += lineTotal;
                itemsHtml += `<tr><td>${name}</td><td>${qty}</td><td>₹${rateVal.toLocaleString()}</td><td>₹${lineTotal.toLocaleString()}</td></tr>`;
            }
        });

        const taxAmount = subtotal * (rate / 100);
        const grandTotal = subtotal + taxAmount;

        let taxBreakdown = gstType === "IGST" ? 
            `<tr><td colspan="3" align="right">IGST (${rate}%)</td><td>₹${taxAmount.toLocaleString()}</td></tr>` :
            `<tr><td colspan="3" align="right">CGST (${rate/2}%)</td><td>₹${(taxAmount/2).toLocaleString()}</td></tr>
             <tr><td colspan="3" align="right">SGST (${rate/2}%)</td><td>₹${(taxAmount/2).toLocaleString()}</td></tr>`;

        const printWin = window.open('', '_blank');
        printWin.document.write(`
            <html><head><style>
                body { font-family: sans-serif; padding: 40px; color: #333; }
                .bill-head { display: flex; justify-content: space-between; border-bottom: 2px solid #333; padding-bottom: 20px; }
                table { width: 100%; border-collapse: collapse; margin-top: 30px; }
                th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
                th { background: #f4f4f4; }
                .totals { margin-top: 20px; width: 300px; margin-left: auto; font-size: 1.1rem; }
                .grand-total { background: #0f172a; color: white; padding: 10px; margin-top: 10px; }
                @media print { .no-print { display: none; } }
            </style></head>
            <body>
                <div class="bill-head">
                    <div><h1>DHARA ENTERPRISE</h1><p>Authorized Tax Invoice</p></div>
                    <div align="right">
                        <p><strong>Invoice No:</strong> ${invNo}</p>
                        <p><strong>Date:</strong> ${date}</p>
                        <p><strong>To:</strong> ${customer}</p>
                    </div>
                </div>
                <table>
                    <thead><tr><th>Description</th><th>Qty</th><th>Unit Rate</th><th>Amount</th></tr></thead>
                    <tbody>${itemsHtml}</tbody>
                    <tfoot>
                        <tr><td colspan="3" align="right">Subtotal</td><td>₹${subtotal.toLocaleString()}</td></tr>
                        ${taxBreakdown}
                    </tfoot>
                </table>
                <div class="totals">
                    <div class="grand-total"><strong>Grand Total: ₹${grandTotal.toLocaleString()}</strong></div>
                </div>
                <div style="margin-top: 50px; text-align: center;">
                    <p>Thank you for choosing Dhara Enterprise!</p>
                    <button class="no-print" onclick="window.print()" style="padding: 10px 20px; cursor: pointer;">Print Invoice</button>
                </div>
            </body></html>
        `);
    }
</script>

</body>
</html>
